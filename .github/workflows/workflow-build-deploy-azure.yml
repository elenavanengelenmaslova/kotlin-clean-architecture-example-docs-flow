name: Standard CI/CD workflow for Azure Functions

on:
  workflow_call:
    inputs:
      azure_region:
        required: false
        type: string
        default: "West Europe"
      azure_resource_group:
        required: false
        type: string
        default: "CleanArchitectureRG-WEU"
    secrets:
      azure_subscription_id:
        required: true
      azure_oidc_client_id:
        required: true
      azure_tenant_id:
        required: true
      AZURE_STORAGE_ACCOUNT_NAME:
        required: true
      azure_sender_email:
        required: true
      recipient_email:
        required: true

env:
  DEPLOY_TARGET_REGION: ${{ inputs.azure_region }}
  AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
  AZURE_OIDC_CLIENT_ID: ${{ secrets.azure_oidc_client_id }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.azure_subscription_id }}
  AZURE_TENANT_ID: ${{ secrets.azure_tenant_id }}
  BUILD_NO: ${{ github.run_number }}
  AZURE_RESOURCE_GROUP_NAME: ${{ inputs.azure_resource_group }}
  ARM_CLIENT_ID: ${{ secrets.azure_oidc_client_id }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.azure_subscription_id }}
  ARM_TENANT_ID: ${{ secrets.azure_tenant_id }}
  ARM_USE_OIDC: true
  TF_VAR_AZURE_SENDER_EMAIL: ${{ secrets.azure_sender_email }}
  TF_VAR_RECIPIENT_EMAIL: ${{ secrets.recipient_email }}
  STACK_NAME: "Docs-Flow-Azure-Clean-Architecture"

jobs:
  deploy-infra:
    name: Kotlin Spring Cloud Function - Azure deployment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Azure Login with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.azure_oidc_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ secrets.azure_subscription_id }}


      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.10.5

      # Phase 1: provision all infrastructure EXCEPT the Event Grid event
      # subscription. The subscription's creation triggers a synchronous
      # webhook-validation handshake against the function app's blob-extension
      # endpoint, which only exists once the function CODE is deployed
      # (deploy-app job). The subscription is a leaf resource (nothing depends
      # on it), so a targeted apply of everything else stands up the function
      # app without attempting that handshake. The subscription is created
      # later in the deploy-eventgrid job, after the code is live.
      - name: Deploy infrastructure with Terraform (excluding Event Grid subscription)
        run: |
          cd ${GITHUB_WORKSPACE}/cdk/azure/cdktf.out/stacks/${STACK_NAME}
          terraform init -reconfigure \
            -backend-config="resource_group_name=${AZURE_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${AZURE_STORAGE_ACCOUNT_NAME}"
          terraform apply -auto-approve \
            -var="AZURE_CLIENT_ID=${AZURE_OIDC_CLIENT_ID}" \
            -var="AZURE_SUBSCRIPTION_ID=${AZURE_SUBSCRIPTION_ID}" \
            -var="AZURE_TENANT_ID=${AZURE_TENANT_ID}" \
            -var="AZURE_STORAGE_ACCOUNT_NAME=${AZURE_STORAGE_ACCOUNT_NAME}" \
            -var="AZURE_RESOURCE_GROUP_NAME=${AZURE_RESOURCE_GROUP_NAME}" \
            -var="AZURE_SENDER_EMAIL=${TF_VAR_AZURE_SENDER_EMAIL}" \
            -var="RECIPIENT_EMAIL=${TF_VAR_RECIPIENT_EMAIL}" \
            -target=azurerm_eventgrid_system_topic.DocsFlowBlobSystemTopic \
            -target=azurerm_storage_container.docs-flow-container \
            -target=azurerm_storage_container.docs-flow-deployment-container \
            -target=azurerm_role_assignment.DocsFlowFunctionAppBlobStorageRole \
            -target=azurerm_role_assignment.DocsFlowFunctionAppStorageContributorRole \
            -target=azurerm_role_assignment.DocsFlowFunctionAppQueueContributorRole \
            -target=azurerm_role_assignment.DocsFlowFunctionAppACSEmailSenderRole


  deploy-app:
    runs-on: ubuntu-latest
    needs: [ deploy-infra ]
    name: Azure Functions deployment

    env:
      # Staging folder produced by the Gradle azureFunctionsPackage task
      # (build/azure-functions/<appName>). This is the artifact the
      # Flex-compatible Azure/functions-action deploys.
      FUNCTIONS_PACKAGE_PATH: software/infrastructure/azure/build/azure-functions/docs-flow-spring-clean-architecture-fun

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Login to Azure with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.azure_oidc_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ secrets.azure_subscription_id }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # The Gradle azureFunctionsPackage task's final step ("Installing function
      # extensions if needed") probes for the Core Tools version and fails if
      # func is not on PATH — even though host.json uses an extension bundle, so
      # nothing is actually installed. Core Tools is required for PACKAGING only;
      # the deploy itself is handled by Azure/functions-action below.
      - name: Install Azure Functions Core Tools v4
        run: |
          npm install -g azure-functions-core-tools@4 --unsafe-perm true

      # Build the function staging folder only. azureFunctionsPackage is a
      # local-only task; unlike azureFunctionsDeploy it does NOT push the
      # invalid LinuxFxVersion site-config property that Flex Consumption
      # rejects. The deprecated Gradle deploy plugin (last release 1.16.1,
      # never updated for Flex) is intentionally not used for deployment.
      - name: Package function app with Gradle
        run: |
          cd ${GITHUB_WORKSPACE}
          ./gradlew clean :infra-azure:azureFunctionsPackage

      # Flex-aware deploy via the official Azure Functions action. It uses the
      # OneDeploy mechanism Flex Consumption requires (classic zip deploy is
      # unsupported on Flex) and resolves the Flex SKU automatically from the
      # OIDC-authenticated az session, so no publish-profile/sku is needed.
      - name: Deploy to Azure Functions (Flex Consumption)
        uses: Azure/functions-action@v1
        with:
          app-name: docs-flow-spring-clean-architecture-fun
          package: ${{ env.FUNCTIONS_PACKAGE_PATH }}

      - name: Retrieve endpoint and run health check
        run: |
          FUNC_URL=$(az functionapp show --name docs-flow-spring-clean-architecture-fun \
            --resource-group $AZURE_RESOURCE_GROUP_NAME --query defaultHostName -o tsv)
          FUNC_KEY=$(az functionapp keys list --name docs-flow-spring-clean-architecture-fun \
            --resource-group $AZURE_RESOURCE_GROUP_NAME --query functionKeys.default -o tsv)
          # Mask the function key so it can never be printed in logs (env dumps, set -x, etc.)
          echo "::add-mask::$FUNC_KEY"
          FUNC_URL="https://$FUNC_URL"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -m 30 \
              "$FUNC_URL/api/health?code=$FUNC_KEY")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed with status 200"
              exit 0
            fi
            echo "Attempt $i: received status $STATUS"
            if [ "$i" -lt 3 ]; then
              sleep 10
            fi
          done
          echo "Health check failed after 3 attempts. Last status code: $STATUS"
          exit 1


  deploy-eventgrid:
    runs-on: ubuntu-latest
    needs: [ deploy-app ]
    name: Event Grid blob-trigger subscription

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.azure_oidc_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ secrets.azure_subscription_id }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.10.5

      # Phase 3: full apply (no -target). The function code is now deployed, so
      # the blob-extension webhook endpoint is live and Event Grid's webhook
      # validation handshake succeeds when the subscription is created. A full
      # apply also reconciles any drift left by the targeted phase-1 apply.
      - name: Create Event Grid subscription with Terraform
        run: |
          cd ${GITHUB_WORKSPACE}/cdk/azure/cdktf.out/stacks/${STACK_NAME}
          terraform init -reconfigure \
            -backend-config="resource_group_name=${AZURE_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${AZURE_STORAGE_ACCOUNT_NAME}"
          terraform apply -auto-approve \
            -var="AZURE_CLIENT_ID=${AZURE_OIDC_CLIENT_ID}" \
            -var="AZURE_SUBSCRIPTION_ID=${AZURE_SUBSCRIPTION_ID}" \
            -var="AZURE_TENANT_ID=${AZURE_TENANT_ID}" \
            -var="AZURE_STORAGE_ACCOUNT_NAME=${AZURE_STORAGE_ACCOUNT_NAME}" \
            -var="AZURE_RESOURCE_GROUP_NAME=${AZURE_RESOURCE_GROUP_NAME}" \
            -var="AZURE_SENDER_EMAIL=${TF_VAR_AZURE_SENDER_EMAIL}" \
            -var="RECIPIENT_EMAIL=${TF_VAR_RECIPIENT_EMAIL}"
